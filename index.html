<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylized Campus</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background: #f4d2a5;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      .hint {
        position: fixed; left: 18px; bottom: 16px;
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        color: rgba(40, 30, 20, 0.7);
        pointer-events: none;
        letter-spacing: 0.02em;
        z-index: 5;
      }

      .ui-button {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 5;
        pointer-events: auto;
        appearance: none;
        display: inline-flex;
        align-items: center;
        gap: 9px;
        padding: 10px 15px 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        background: linear-gradient(135deg,
          rgba(255, 250, 240, 0.2),
          rgba(255, 230, 200, 0.08));
        backdrop-filter: blur(16px) saturate(1.3);
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        color: #2a1f12;
        font: 12.5px/1 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.03em;
        cursor: pointer;
        box-shadow:
          0 0 20px rgba(255, 220, 170, 0.25),
          0 8px 24px rgba(40, 25, 10, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
        transition:
          background 0.22s ease,
          color 0.22s ease,
          border-color 0.22s ease,
          box-shadow 0.22s ease,
          transform 0.18s ease;
      }
      .ui-button:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg,
          rgba(255, 250, 240, 0.32),
          rgba(255, 230, 200, 0.16));
      }
      .ui-button .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffe6b8, #d6a26d);
        box-shadow:
          0 0 10px rgba(255, 200, 140, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
        transition: background 0.22s ease, box-shadow 0.22s ease;
      }
      .ui-button[data-mode="night"] {
        color: #f0e6d0;
        background: linear-gradient(135deg,
          rgba(50, 60, 95, 0.4),
          rgba(20, 28, 60, 0.22));
        border-color: rgba(180, 200, 235, 0.32);
        box-shadow:
          0 0 22px rgba(140, 170, 240, 0.28),
          0 8px 24px rgba(8, 10, 30, 0.4),
          inset 0 1px 0 rgba(220, 230, 255, 0.32);
      }
      .ui-button[data-mode="night"]:hover {
        background: linear-gradient(135deg,
          rgba(60, 75, 115, 0.5),
          rgba(30, 40, 80, 0.3));
      }
      .ui-button[data-mode="night"] .dot {
        background: linear-gradient(135deg, #e2eaff, #a8b8e0);
        box-shadow:
          0 0 14px rgba(180, 200, 255, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .popup {
        position: fixed;
        pointer-events: none;
        transform: translate(-50%, -100%);
        z-index: 10;
        transition: opacity 0.18s ease;
        will-change: left, top, opacity;
      }
      .popup.hidden { display: none; }

      .popup-inner {
        pointer-events: auto;
        min-width: 240px;
        max-width: 280px;
        padding: 18px 20px 16px;
        border-radius: 16px;
        background: linear-gradient(135deg,
          rgba(255, 250, 240, 0.18),
          rgba(255, 230, 200, 0.08));
        backdrop-filter: blur(18px) saturate(1.35);
        -webkit-backdrop-filter: blur(18px) saturate(1.35);
        border: 1px solid rgba(255, 255, 255, 0.32);
        box-shadow:
          0 0 32px rgba(255, 220, 170, 0.45),
          0 0 72px rgba(255, 200, 140, 0.18),
          0 14px 38px rgba(40, 25, 10, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.5),
          inset 0 -1px 0 rgba(255, 220, 180, 0.18),
          inset 0 0 28px rgba(255, 235, 200, 0.12);
        color: #2a1f12;
        animation:
          popup-appear 0.32s cubic-bezier(0.2, 0.8, 0.2, 1) both,
          popup-float 4s ease-in-out 0.32s infinite;
      }

      @keyframes popup-appear {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes popup-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-5px); }
      }

      .popup-title {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 6px;
        letter-spacing: 0.01em;
        color: #2a1a08;
        text-shadow: 0 1px 0 rgba(255, 240, 215, 0.5);
      }
      .popup-desc {
        font-size: 13px;
        line-height: 1.5;
        color: rgba(40, 30, 18, 0.82);
        margin: 0 0 14px;
      }
      .popup-btn {
        pointer-events: auto;
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: linear-gradient(135deg,
          rgba(255, 210, 155, 0.42),
          rgba(255, 180, 120, 0.22));
        color: #2a1a08;
        padding: 8px 14px;
        border-radius: 9px;
        font: 12.5px/1 inherit;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          0 1px 2px rgba(40, 25, 10, 0.15);
      }
      .popup-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg,
          rgba(255, 210, 155, 0.65),
          rgba(255, 180, 120, 0.4));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 4px 14px rgba(255, 180, 120, 0.4),
          0 2px 6px rgba(40, 25, 10, 0.2);
      }
      .popup-btn:active {
        transform: translateY(0);
      }
      .popup-btn .arrow {
        display: inline-block;
        transition: transform 0.18s ease;
        margin-left: 4px;
      }
      .popup-btn:hover .arrow { transform: translateX(3px); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hint">drag to orbit · scroll to zoom · right-drag to pan · press F for cinematic flythrough · click a building</div>

    <button id="night-toggle" class="ui-button" type="button" data-mode="day">
      <span class="dot"></span>
      <span class="label">Night mode</span>
    </button>

    <div id="popup" class="popup hidden">
      <div class="popup-inner">
        <div class="popup-title">Building</div>
        <div class="popup-desc">Description.</div>
        <button class="popup-btn" type="button">Read more <span class="arrow">→</span></button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
